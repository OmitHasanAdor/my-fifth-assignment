    * {

      font-family: "Geist", sans-serif;

  <title>GitHub Issues Tracker | Home </title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="bg-[#F8FAFC] pb-6">
  <header class=" mb-15">
    <div class="navbar bg-base-100 shadow-sm">
      <div class="flex-1">

        <a href="" class="flex justify-start items-center w-11/12 mx-auto gap-3"> <img src="./assets/github-logo.png"
            width="30px" alt="">
          <h3 class="text-xl font-bold">GitHub Issues Tracker</h3>
        </a>


      </div>
      <div class="flex gap-2">
        <section class="flex justify-center items-center  my-5">
          <div class="join space-x-1">
            <div>
              <label class="input rounded-sm validator join-item">
                <i class="fa-solid fa-magnifying-glass text-gray-400"></i>
                <input class="rounded-lg" id="searchInput" type="text" placeholder="Search issues..." required />
              </label>

            </div>
            <button id="searchBtn" class="btn btn-primary join-item rounded-sm"><i class="fa-solid fa-plus"></i> New
              Issue</button>
          </div>
        </section>
      </div>
    </div>
  </header>

  <section
    class="buttonCont gap-4 flex justify-start items-center my-5 bg-white w-11/12 mx-auto p-4 rounded-lg shadow-sm">
    <button onclick="showTab('all', event)" class="tab-btn btn btn-outline btn-primary">All</button>
    <button onclick="showTab('open', event)" class="tab-btn btn btn-outline btn-primary">Open</button>
    <button onclick="showTab('closed', event)" class="tab-btn btn btn-outline btn-primary">Closed</button>
  </section>

  <section class="issuesCont flex justify-between items-center my-5 bg-white w-11/12 mx-auto p-4 rounded-lg shadow-sm">
    <div class="issuesCount flex justify-between items-center gap-4">
      <div class=""><img src="./assets/Aperture.png" alt=""></div>
      <div class="">
        <h3 class="text-2xl font-bold"><span id="issueCountText">0</span> Issues</h3>
        <p class="text-gray-600">Track and manage your project issues</p>
      </div>
    </div>
    <div class="openCloseIcon flex justify-between items-center gap-4">
      <img src="./assets/Open-Status.png" alt=""><span class="">Open</span>
      <img src="./assets/Closed- Status .png" alt=""><span class="">Closed</span>
    </div>
  </section>

  <section id="issuesCont"
    class="w-[100%] mx-auto bg-[#F8FAFC]  p-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-2">
  </section>
